<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="skyline" aria-hidden="true"></div>

  <div class="container">
    <header>
      <h1>테트리스</h1>
      <p class="subtitle">King Kong Edition</p>
    </header>

    <main class="game-area">
      <aside class="kong-stage" aria-hidden="true">
        <div class="building">
          <div class="building-top"></div>
          <div class="building-body">
            <div class="window-row"><span></span><span></span></div>
            <div class="window-row"><span></span><span></span></div>
            <div class="window-row"><span></span><span></span></div>
          </div>
        </div>
        <div class="kong-platform"></div>
        <div class="king-kong">
          <div class="kong-head">
            <div class="kong-eye left"></div>
            <div class="kong-eye right"></div>
            <div class="kong-brow"></div>
          </div>
          <div class="kong-body"></div>
          <div class="kong-arm left"></div>
          <div class="kong-arm right"></div>
          <div class="kong-leg left"></div>
          <div class="kong-leg right"></div>
        </div>
        <div class="kong-shadow"></div>
      </aside>

      <section class="board-section">
        <div class="board-frame">
          <div id="game-board" class="game-board" aria-label="테트리스 게임 보드"></div>
        </div>
      </section>

      <aside class="info-panel">
        <div class="score-box">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
          <p id="game-status" class="game-status" aria-live="polite"></p>
        </div>

        <div class="button-group">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </div>

        <div class="controls-guide">
          <h2>조작법</h2>
          <ul>
            <li><kbd>←</kbd> : 왼쪽 이동</li>
            <li><kbd>→</kbd> : 오른쪽 이동</li>
            <li><kbd>↓</kbd> : 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> : 회전 (충돌 시 취소)</li>
            <li><kbd>Space</kbd> : 즉시 낙하 (hard drop)</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
